    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import {
            getFirestore, collection, doc, getDoc, getDocs, addDoc, setDoc, updateDoc, deleteDoc,
            arrayUnion, query, where, orderBy, limit, onSnapshot, serverTimestamp, increment
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { uploadToCloudinary } from "./cloudinary-upload.js";

        /* ─── Firebase init ─── */
        const firebaseConfig = {
            apiKey: "AIzaSyBQ9UYY6uh3CgXzytNwt_r2LCwaXval9T8",
            authDomain: "tutorapp-95f48.firebaseapp.com",
            projectId: "tutorapp-95f48",
            storageBucket: "tutorapp-95f48.firebasestorage.app",
            messagingSenderId: "559214827748",
            appId: "1:559214827748:web:c77d90b72d607f6df1b4f1"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        /* ─── State ─── */
        let me = null;
        let currentTab = 'direct';
        let contacts = [];
        let clubs = [];
        let activeChat = null;
        let msgUnsub = null;
        let clubsUnsub = null;
        let notifsUnsub = null;
        let typingTimer = null;
        let lastMsgByRoom = {};
        let unreadByRoom = {};
        let searchQ = '';
        let pendingFile = null;
        let totalUnread = 0;
        window._pendingDirectUid = null; // contact opened via URL ?to= param (shown even without prior messages)

        /* ─── DOM helpers ─── */
        const $ = id => document.getElementById(id);
        const esc = s => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        const makeChatId = (a, b) => [a, b].sort().join('_');

        const toast = (msg, dur = 2800) => {
            const el = $('toast');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), dur);
        };

        window.logout = async function () {
            try { await setPresence(false); await signOut(auth); window.location.href = './auth.html'; }
            catch (e) { toast('⚠️ Не удалось выйти'); }
        };

        const fmtTime = ts => {
            if (!ts) return '';
            const d = ts.toDate ? ts.toDate() : new Date(ts);
            return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        };
        const fmtDate = ts => {
            if (!ts) return '';
            const d = ts.toDate ? ts.toDate() : new Date(ts);
            const today = new Date();
            const yest = new Date(today); yest.setDate(yest.getDate() - 1);
            if (d.toDateString() === today.toDateString()) return 'Сегодня';
            if (d.toDateString() === yest.toDateString()) return 'Вчера';
            return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
        };

        const COLORS = ['#00A896', '#5BBDB5', '#007F72', '#38D68A', '#4A90D9', '#9B59B6', '#E67E22', '#E05A7A'];
        function strColor(str) {
            let h = 0;
            for (let i = 0; i < str.length; i++) h = str.charCodeAt(i) + ((h << 5) - h);
            return COLORS[Math.abs(h) % COLORS.length];
        }

        function avatarHtml(name, photoUrl, size = 42) {
            const init = (name || '?')[0].toUpperCase();
            const bg = strColor(name || '?');
            if (photoUrl) {
                return `<img src="${esc(photoUrl)}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"
      onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<div class=\\'conv-av-init\\' style=\\'font-size:${Math.round(size * .38)}px;background:${bg};\\'>${init}</div>')">`;
            }
            return `<div class="conv-av-init" style="font-size:${Math.round(size * .38)}px;background:${bg};">${init}</div>`;
        }

        function setHdrAvatar(name, photoUrl, emoji) {
            const el = $('chatHdrAv');
            el.style.cssText = '';
            if (emoji) { el.innerHTML = emoji; el.style.fontSize = '22px'; el.style.background = 'var(--teal-pale)'; return; }
            if (photoUrl) {
                el.innerHTML = `<img src="${esc(photoUrl)}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
            } else {
                el.innerHTML = (name || '?')[0].toUpperCase();
                el.style.background = strColor(name || '?');
                el.style.color = '#fff';
            }
        }

        /* ─── PRESENCE ─── */
        async function setPresence(online) {
            if (!me) return;
            try {
                await setDoc(doc(db, 'presence', me.uid), { online, lastSeen: serverTimestamp(), uid: me.uid }, { merge: true });
            } catch (e) { }
        }

        /* ─── NOTIFICATIONS ─── */
        async function createNotification(toUid, fromName, text, chatType, chatId) {
            try {
                await addDoc(collection(db, 'notifications'), {
                    toUid, fromUid: me.uid, fromName,
                    text: text.length > 80 ? text.slice(0, 80) + '…' : text,
                    chatType, chatId, read: false,
                    createdAt: serverTimestamp()
                });
            } catch (e) { console.error('notif:', e); }
        }

        function subscribeNotifications() {
            if (notifsUnsub) notifsUnsub();
            const q = query(collection(db, 'notifications'), where('toUid', '==', me.uid), where('read', '==', false));
            notifsUnsub = onSnapshot(q, snap => {
                const cnt = snap.size;
                const badge = $('notifBadge');
                if (cnt > 0) {
                    badge.textContent = cnt > 9 ? '9+' : cnt;
                    badge.style.display = 'flex';
                    $('hNotif').classList.add('notif-pulse');
                    setTimeout(() => $('hNotif').classList.remove('notif-pulse'), 400);
                } else {
                    badge.style.display = 'none';
                }
                // Browser notification for new messages
                snap.docChanges().forEach(change => {
                    if (change.type === 'added') {
                        const d = change.doc.data();
                        if (document.hidden && Notification.permission === 'granted') {
                            new Notification(`TutorApp — ${d.fromName}`, { body: d.text, icon: '/favicon.ico' });
                        }
                    }
                });
            }, () => { });
        }

        /* ─── TYPING INDICATOR ─── */
        async function setTyping(isTyping) {
            if (!activeChat || !me) return;
            const chatId = activeChat.type === 'direct'
                ? makeChatId(me.uid, activeChat.id)
                : activeChat.id;
            try {
                await setDoc(doc(db, 'typing', `${chatId}_${me.uid}`), {
                    chatId, uid: me.uid, name: me.name, typing: isTyping, ts: serverTimestamp()
                });
            } catch (e) { }
        }

        let typingUnsub = null;
        function subscribeTyping(chatId) {
            if (typingUnsub) typingUnsub();
            const q = query(collection(db, 'typing'),
                where('chatId', '==', chatId),
                where('typing', '==', true)
            );
            typingUnsub = onSnapshot(q, snap => {
                const typingArea = $('msgsArea');
                const existing = typingArea.querySelector('.typing-row');
                const others = snap.docs.filter(d => d.data().uid !== me.uid);
                if (existing) existing.remove();
                if (others.length > 0) {
                    const name = others[0].data().name;
                    const row = document.createElement('div');
                    row.className = 'typing-row';
                    row.innerHTML = `<div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
                    typingArea.appendChild(row);
                    typingArea.scrollTop = typingArea.scrollHeight;
                }
            }, () => { });
        }

        /* ─── AUTH GATE ─── */
        onAuthStateChanged(auth, async user => {
            if (!user) { window.location.href = 'auth.html'; return; }

            let profileName = user.displayName || user.email?.split('@')[0] || 'Пользователь';
            let profilePhoto = user.photoURL || null;
            try {
                const snap = await getDoc(doc(db, 'users', user.uid));
                if (snap.exists()) {
                    const d = snap.data();
                    profileName = d.fullName || d.nick || profileName;
                    profilePhoto = d.photoUrl || profilePhoto;
                }
            } catch (e) { console.error('Profile fetch:', e); }

            me = { uid: user.uid, name: profileName, photoUrl: profilePhoto };

            const hav = $('headerAvatar');
            if (me.photoUrl) {
                hav.style.backgroundImage = `url(${me.photoUrl})`;
                hav.style.backgroundSize = 'cover';
                hav.textContent = '';
            } else {
                hav.textContent = me.name[0].toUpperCase();
            }

            await setPresence(true);

            // Request notification permission
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }

            // Keep presence alive
            setInterval(() => setPresence(true), 60000);
            window.addEventListener('beforeunload', () => setPresence(false));

            await bootstrap();
        });

        /* ─── BOOTSTRAP ─── */
        async function bootstrap() {
            try {
                await Promise.all([loadContacts(), loadClubs()]);
            } catch (e) {
                console.error('Bootstrap failed:', e);
                toast('⚠️ Ошибка загрузки. Проверьте правила Firestore.');
            }

            startGlobalListeners();
            subscribeNotifications();
            bindUi();
            buildEmojiPicker();

            const params = new URLSearchParams(window.location.search);
            const toUid = params.get('to') || params.get('uid');
            const clubId = params.get('club');

            $('loadingOverlay').style.display = 'none';

            if (toUid && toUid !== me.uid) {
                let contact = contacts.find(c => c.uid === toUid);
                if (!contact) {
                    try {
                        const snap = await getDoc(doc(db, 'users', toUid));
                        if (snap.exists()) {
                            const d = snap.data();
                            contact = {
                                uid: toUid,
                                name: d.fullName || d.nick || d.displayName || 'Пользователь',
                                photoUrl: d.photoUrl || d.photoURL || null,
                                online: false
                            };
                            contacts.push(contact);
                        }
                    } catch (e) { console.error('Load target user:', e); }
                }
                if (contact) {
                    switchTab('direct', false);
                    openDirect(contact, true);
                }
            } else if (clubId) {
                let club = clubs.find(c => c.id === clubId);
                if (club) {
                    switchTab('clubs', false);
                    openClub(club);
                }
            }
        }

        /* ─── LOAD DATA ─── */
        // contacts are built dynamically from real DM conversations (see startGlobalListeners)
        async function loadContacts() {
            // We'll populate contacts from the messages subscription.
            // This is a no-op placeholder so bootstrap() can await it.
            contacts = [];
        }

        async function loadClubs() {
            const snap = await getDocs(collection(db, 'clubs'));
            if (snap.empty) {
                const seeds = [
                    { id: 'club_english', name: 'English Speaking Club', emoji: '🇬🇧', description: 'Практика разговорного английского', members: [] },
                    { id: 'club_math', name: 'Math Champions', emoji: '🧮', description: 'Олимпиадная математика и логика', members: [] },
                    { id: 'club_code', name: 'Code & Coffee', emoji: '☕', description: 'Frontend, Firebase, full-stack', members: [me.uid] },
                    { id: 'club_science', name: 'Science Lab', emoji: '🔬', description: 'Физика, химия, биология', members: [] }
                ];
                clubs = [];
                for (const s of seeds) {
                    try {
                        await setDoc(doc(db, 'clubs', s.id), { name: s.name, emoji: s.emoji, description: s.description, members: s.members });
                        clubs.push({ ...s });
                    } catch (e) { console.error('Seed club:', e); }
                }
            } else {
                clubs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            }
        }

        /* ─── GLOBAL LISTENERS ─── */
        function startGlobalListeners() {
            if (clubsUnsub) clubsUnsub();
            clubsUnsub = onSnapshot(collection(db, 'clubs'), snap => {
                clubs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (currentTab === 'clubs') renderList();
                if (activeChat?.type === 'club') {
                    const updated = clubs.find(c => c.id === activeChat.id);
                    if (updated) {
                        activeChat.members = updated.members || [];
                        const cnt = activeChat.members.length;
                        $('chatHdrStatus').textContent = `👥 ${cnt} участник${cnt === 1 ? '' : cnt < 5 ? 'а' : 'ов'}`;
                        applyClubInputState();
                    }
                }
            }, () => { });

            // Subscribe to unread counts for DMs
            const unreadQ = query(collection(db, 'messages'),
                where('receiverId', '==', me.uid),
                where('read', '==', false)
            );
            onSnapshot(unreadQ, snap => {
                unreadByRoom = {};
                snap.forEach(d => {
                    const chatId = d.data().chatId;
                    unreadByRoom[chatId] = (unreadByRoom[chatId] || 0) + 1;
                });
                if (currentTab === 'direct') renderList();
            }, () => { });

            // ── Build contacts list from REAL conversations only ──
            // We listen to messages where I am the sender OR the receiver
            // and collect the unique partner UIDs to build the contacts list.
            const partnerUids = new Set();

            const buildContacts = async (newUids) => {
                const toFetch = [...newUids].filter(uid => !contacts.find(c => c.uid === uid));
                for (const uid of toFetch) {
                    try {
                        const snap = await getDoc(doc(db, 'users', uid));
                        if (snap.exists()) {
                            const d = snap.data();
                            contacts.push({
                                uid,
                                name: d.fullName || d.nick || d.displayName || 'Пользователь',
                                photoUrl: d.photoUrl || d.photoURL || null,
                                online: false
                            });
                        }
                    } catch (e) { console.error('buildContacts fetch:', e); }
                }
                if (currentTab === 'direct') renderList();
            };

            // Sent messages — I am the sender (detect DMs by receiverId presence)
            const sentQ = query(collection(db, 'messages'),
                where('senderId', '==', me.uid)
            );
            onSnapshot(sentQ, snap => {
                const newUids = new Set();
                snap.forEach(d => {
                    const recv = d.data().receiverId;
                    // Only DMs have a receiverId field
                    if (recv && recv !== me.uid && !partnerUids.has(recv)) {
                        partnerUids.add(recv);
                        newUids.add(recv);
                        // track last message
                        const chatId = d.data().chatId || makeChatId(me.uid, recv);
                        const ts = d.data().timestamp;
                        if (!lastMsgByRoom[chatId] || (ts && ts.toMillis?.() > (lastMsgByRoom[chatId]?.ts?.toMillis?.() || 0))) {
                            lastMsgByRoom[chatId] = { text: d.data().text || '📎', ts };
                        }
                    }
                });
                if (newUids.size) buildContacts(newUids);
                else if (currentTab === 'direct') renderList();
            }, () => { });

            // Received messages — I am the receiver
            const recvQ = query(collection(db, 'messages'),
                where('receiverId', '==', me.uid)
            );
            onSnapshot(recvQ, snap => {
                const newUids = new Set();
                snap.forEach(d => {
                    const sender = d.data().senderId;
                    if (sender && sender !== me.uid && !partnerUids.has(sender)) {
                        partnerUids.add(sender);
                        newUids.add(sender);
                        const chatId = d.data().chatId || makeChatId(me.uid, sender);
                        const ts = d.data().timestamp;
                        if (!lastMsgByRoom[chatId] || (ts && ts.toMillis?.() > (lastMsgByRoom[chatId]?.ts?.toMillis?.() || 0))) {
                            lastMsgByRoom[chatId] = { text: d.data().text || '📎', ts };
                        }
                    }
                });
                if (newUids.size) buildContacts(newUids);
                else if (currentTab === 'direct') renderList();
            }, () => { });
        }

        /* ─── TAB SWITCH ─── */
        function switchTab(tab, render = true) {
            currentTab = tab;
            $('tabDirect').classList.toggle('active', tab === 'direct');
            $('tabClubs').classList.toggle('active', tab === 'clubs');
            $('newGroupBtn').style.display = tab === 'direct' ? 'flex' : 'none';
            if (render) renderList();
        }

        /* ─── RENDER LIST ─── */
        function renderList() {
            const box = $('convos');
            box.innerHTML = '';
            const q = searchQ;

            if (currentTab === 'direct') {
                // Show contacts who have messages, PLUS any contact opened via URL param
                let list = contacts.filter(c => {
                    const chatId = makeChatId(me.uid, c.uid);
                    const hasMessages = !!lastMsgByRoom[chatId];
                    const isPendingDirect = c.uid === window._pendingDirectUid;
                    const matchesSearch = !q || c.name.toLowerCase().includes(q);
                    return (hasMessages || isPendingDirect) && matchesSearch;
                });
                if (!list.length) {
                    box.innerHTML = `<div class="list-empty">${q ? 'Пользователи не найдены по запросу «' + esc(q) + '»' : 'Нет переписок.<br>Найдите репетитора и напишите ему!'}</div>`;
                    return;
                }
                // Sort by last message time
                list.sort((a, b) => {
                    const chatA = makeChatId(me.uid, a.uid);
                    const chatB = makeChatId(me.uid, b.uid);
                    const tsA = lastMsgByRoom[chatA]?.ts?.toMillis?.() || 0;
                    const tsB = lastMsgByRoom[chatB]?.ts?.toMillis?.() || 0;
                    return tsB - tsA;
                });
                list.forEach(c => {
                    const chatId = makeChatId(me.uid, c.uid);
                    const last = lastMsgByRoom[chatId];
                    const unread = unreadByRoom[chatId] || 0;
                    const card = document.createElement('div');
                    card.className = 'conv-card' + (activeChat?.id === c.uid && activeChat?.type === 'direct' ? ' active' : '');
                    card.innerHTML = `
        <div class="conv-av">
          ${avatarHtml(c.name, c.photoUrl)}
          ${c.online ? '<div class="conv-online"></div>' : ''}
        </div>
        <div class="conv-body">
          <div class="conv-name">${esc(c.name)}</div>
          <div class="conv-preview">${last ? esc(last.text) : 'Нет сообщений'}</div>
        </div>
        <div class="conv-meta">
          <div class="conv-time">${last ? fmtTime(last.ts) : ''}</div>
          ${unread > 0 ? `<div class="conv-badge">${unread > 99 ? '99+' : unread}</div>` : ''}
        </div>`;
                    card.addEventListener('click', () => openDirect(c));
                    box.appendChild(card);
                });
            } else {
                let list = clubs.filter(c => !q || c.name.toLowerCase().includes(q));
                if (!list.length) {
                    box.innerHTML = `<div class="list-empty">Клубы не найдены${q ? ' по запросу «' + esc(q) + '»' : ''}</div>`;
                    return;
                }
                list.forEach(c => {
                    const last = lastMsgByRoom[c.id];
                    const card = document.createElement('div');
                    card.className = 'conv-card' + (activeChat?.id === c.id && activeChat?.type === 'club' ? ' active' : '');
                    const isMember = (c.members || []).includes(me.uid);
                    card.innerHTML = `
        <div class="conv-av"><div class="club-icon">${c.emoji || '🏠'}</div></div>
        <div class="conv-body">
          <div class="conv-name">${esc(c.name)}</div>
          <div class="conv-preview">${last ? esc(last.text) : (c.description || 'Нет сообщений')}</div>
        </div>
        <div class="conv-meta">
          <div class="conv-time">${last ? fmtTime(last.ts) : ''}</div>
          ${!isMember ? '<span style="font-size:9px;color:var(--muted);background:var(--bg);padding:2px 6px;border-radius:8px;border:1px solid var(--border);">Вступить</span>' : ''}
        </div>`;
                    card.addEventListener('click', () => openClub(c));
                    box.appendChild(card);
                });
            }
        }

        /* ─── OPEN DIRECT ─── */
        function openDirect(contact, fromUrl = false) {
            if (msgUnsub) msgUnsub();
            if (typingUnsub) typingUnsub();
            activeChat = { id: contact.uid, type: 'direct', name: contact.name, photoUrl: contact.photoUrl };
            window._activeChatPartnerUid = contact.uid;
            // Track this contact as pending so they appear in list even without prior messages
            window._pendingDirectUid = contact.uid;
            $('chatEmpty').style.display = 'none';
            $('chatHeader').style.display = 'flex';
            $('msgsArea').style.display = 'flex';
            $('msgsArea').style.flexDirection = 'column';
            $('videoBtn').style.display = 'flex';
            $('joinBar').style.display = 'none';
            $('inputBar').style.display = 'flex';
            $('chatInput').disabled = false;
            $('sendBtn').disabled = false;
            $('chatInput').placeholder = `Написать ${esc(contact.name)}...`;
            setHdrAvatar(contact.name, contact.photoUrl, null);
            $('chatHdrName').textContent = contact.name;
            $('chatHdrStatus').textContent = contact.online ? '● В сети' : 'Не в сети';
            $('chatHdrStatus').className = 'chat-hdr-status' + (contact.online ? ' online' : '');

            // Subscribe to presence for this contact
            onSnapshot(doc(db, 'presence', contact.uid), snap => {
                const d = snap.data();
                if (d) {
                    const online = d.online === true;
                    $('chatHdrStatus').textContent = online ? '● В сети' : 'Не в сети';
                    $('chatHdrStatus').className = 'chat-hdr-status' + (online ? ' online' : '');
                }
            }, () => { });

            renderList();
            const chatId = makeChatId(me.uid, contact.uid);
            subscribeTyping(chatId);
            subscribeMessages(chatId, 'direct');
            markMessagesRead(chatId);

            // On mobile: auto-open the chat panel immediately (for both URL nav and list click)
            if (isMobile()) {
                setTimeout(mobOpenChat, 60);
            }
        }

        /* ─── OPEN PARTNER PROFILE ─── */
        window._openChatPartnerProfile = function () {
            const uid = window._activeChatPartnerUid;
            if (uid) window.location.href = 'profile.html?uid=' + uid;
        };

        /* ─── OPEN CLUB ─── */
        function openClub(club) {
            if (msgUnsub) msgUnsub();
            if (typingUnsub) typingUnsub();
            window._activeChatPartnerUid = null; // не личный чат
            const freshClub = clubs.find(c => c.id === club.id) || club;
            activeChat = { id: freshClub.id, type: 'club', name: freshClub.name, members: freshClub.members || [], emoji: freshClub.emoji };
            $('chatEmpty').style.display = 'none';
            $('chatHeader').style.display = 'flex';
            $('msgsArea').style.display = 'flex';
            $('msgsArea').style.flexDirection = 'column';
            $('videoBtn').style.display = 'none';
            setHdrAvatar(freshClub.name, null, freshClub.emoji || '♣');
            $('chatHdrName').textContent = freshClub.name;
            const cnt = activeChat.members.length;
            $('chatHdrStatus').textContent = `👥 ${cnt} участник${cnt === 1 ? '' : cnt < 5 ? 'а' : 'ов'}`;
            $('chatHdrStatus').className = 'chat-hdr-status';
            applyClubInputState();
            renderList();
            subscribeTyping(freshClub.id);
            subscribeMessages(freshClub.id, 'club');

            // On mobile: auto-open the chat panel
            if (isMobile()) {
                setTimeout(mobOpenChat, 60);
            }
        }

        function applyClubInputState() {
            if (!activeChat || activeChat.type !== 'club') return;
            const isMember = (activeChat.members || []).includes(me.uid);
            if (isMember) {
                $('inputBar').style.display = 'flex';
                $('joinBar').style.display = 'none';
                $('chatInput').disabled = false;
                $('sendBtn').disabled = false;
                $('chatInput').placeholder = 'Написать в клуб...';
            } else {
                $('inputBar').style.display = 'none';
                $('joinBar').style.display = 'flex';
            }
        }

        async function joinClub() {
            if (!activeChat || activeChat.type !== 'club') return;
            const btn = $('joinBtn');
            btn.disabled = true; btn.textContent = 'Подождите...';
            try {
                await updateDoc(doc(db, 'clubs', activeChat.id), { members: arrayUnion(me.uid) });
                toast('🎉 Вы вступили в клуб!');
                setTimeout(() => $('chatInput').focus(), 100);
            } catch (e) {
                console.error('joinClub:', e);
                toast('⚠️ Не удалось вступить. Проверьте Firestore Rules.');
                btn.disabled = false; btn.textContent = 'Вступить в клуб';
            }
        }

        /* ─── MARK MESSAGES READ ─── */
        async function markMessagesRead(chatId) {
            try {
                const q = query(collection(db, 'messages'),
                    where('chatId', '==', chatId),
                    where('receiverId', '==', me.uid),
                    where('read', '==', false)
                );
                const snap = await getDocs(q);
                const promises = snap.docs.map(d => updateDoc(d.ref, { read: true }));
                await Promise.all(promises);
                // Mark related notifications as read
                const nq = query(collection(db, 'notifications'),
                    where('toUid', '==', me.uid),
                    where('chatId', '==', chatId),
                    where('read', '==', false)
                );
                const nsnap = await getDocs(nq);
                await Promise.all(nsnap.docs.map(d => updateDoc(d.ref, { read: true })));
            } catch (e) { }
        }

        /* ─── SUBSCRIBE MESSAGES ─── */
        function subscribeMessages(chatId, chatType) {
            $('msgsArea').innerHTML = '';
            const q = query(
                collection(db, 'messages'),
                where('chatId', '==', chatId),
                orderBy('timestamp', 'asc')
            );
            msgUnsub = onSnapshot(q, snap => {
                const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (msgs.length) {
                    const last = msgs[msgs.length - 1];
                    lastMsgByRoom[chatId] = {
                        text: last.type === 'image' ? '📷 Фото' : last.type === 'file' ? `📎 ${last.fileName || 'Файл'}` : (last.text || ''),
                        ts: last.timestamp
                    };
                    renderList();
                }
                renderMessages(msgs, chatId);
                // Auto mark as read if this chat is active
                if (activeChat) markMessagesRead(chatId);
            }, e => {
                console.error('Messages listener error:', e);
                $('msgsArea').innerHTML = `
      <div style="padding:28px 20px;text-align:center;">
        <p style="color:var(--red);font-size:14px;">⚠️ Не удалось загрузить сообщения</p>
        <p style="color:var(--muted);font-size:12px;margin-top:6px;">Проверьте <b>Firestore Rules</b> для коллекции <b>messages</b></p>
      </div>`;
            });
        }

        /* ─── RENDER MESSAGES ─── */
        function renderMessages(msgs, chatId) {
            const area = $('msgsArea');
            // Save scroll position — if near bottom, auto-scroll
            const wasAtBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 80;
            area.innerHTML = '';

            // Name resolution: try contacts cache first, then senderName stored in message, then fetch from Firestore
            const _nameCache = {};
            const nameOf = (uid, msgSenderName) => {
                if (uid === me.uid) return me.name;
                if (_nameCache[uid]) return _nameCache[uid];
                const fromContacts = contacts.find(c => c.uid === uid)?.name;
                if (fromContacts) return fromContacts;
                // Fall back to senderName stored in message doc (always saved on send)
                if (msgSenderName && msgSenderName !== 'Пользователь') return msgSenderName;
                // Background-fetch from Firestore and re-render when available
                getDoc(doc(db, 'users', uid)).then(snap => {
                    if (snap.exists()) {
                        const d = snap.data();
                        const n = d.fullName || d.nick || d.displayName || msgSenderName || uid;
                        _nameCache[uid] = n;
                        if (!contacts.find(c => c.uid === uid)) {
                            contacts.push({ uid, name: n, photoUrl: d.photoUrl || d.photoURL || null, online: false });
                        }
                    }
                }).catch(() => { });
                return msgSenderName || uid.slice(0, 6) + '…';
            };
            const photoOf = uid => uid === me.uid
                ? me.photoUrl
                : contacts.find(c => c.uid === uid)?.photoUrl || null;

            let lastDateStr = '';

            msgs.forEach(msg => {
                const isOut = msg.senderId === me.uid;
                const dateStr = fmtDate(msg.timestamp);

                if (dateStr && dateStr !== lastDateStr) {
                    lastDateStr = dateStr;
                    const sep = document.createElement('div');
                    sep.className = 'date-sep';
                    sep.textContent = dateStr;
                    area.appendChild(sep);
                }

                const row = document.createElement('div');
                row.className = `msg-row ${isOut ? 'out' : 'in'}`;

                let avHtml = '';
                if (!isOut) {
                    const photo = photoOf(msg.senderId);
                    const name = nameOf(msg.senderId, msg.senderName);
                    const init = (name || '?')[0].toUpperCase();
                    const color = strColor(msg.senderId || name || '?');
                    avHtml = `<div class="msg-av-mini" style="background:${color};color:#fff;">
        ${photo ? `<img src="${esc(photo)}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.style.display='none'">` : init}
      </div>`;
                }

                // Message content
                let content = '';
                if (msg.type === 'image' && msg.imageUrl) {
                    content = `<img src="${esc(msg.imageUrl)}" class="msg-img" alt="Изображение" loading="lazy" onclick="document.getElementById('lightbox').classList.add('open');document.getElementById('lightboxImg').src=this.src;">`;
                } else if (msg.type === 'file' && msg.fileUrl) {
                    const fileExt = (msg.fileName || '').split('.').pop().toUpperCase();
                    const fileIcon = getFileIcon(fileExt);
                    const sizeStr = msg.fileSize ? formatBytes(msg.fileSize) : '';
                    content = `<div class="msg-file" onclick="window.open('${esc(msg.fileUrl)}','_blank')">
        <span class="msg-file-icon">${fileIcon}</span>
        <div><div class="msg-file-name">${esc(msg.fileName || 'Файл')}</div>${sizeStr ? `<div class="msg-file-size">${sizeStr}</div>` : ''}</div>
      </div>`;
                } else {
                    content = esc(msg.text || '').replace(/\n/g, '<br>');
                }

                // Telegram-style colored nickname for group chat
                const _clubColors = ['#E53935', '#8E24AA', '#1E88E5', '#00897B', '#F4511E', '#6D4C41', '#546E7A', '#D81B60', '#00ACC1', '#43A047'];
                const _nickColor = _clubColors[Math.abs(msg.senderId.split('').reduce((a, c) => a + c.charCodeAt(0), 0)) % _clubColors.length];
                const senderLabel = (activeChat.type === 'club' && !isOut)
                    ? `<div class="msg-sender" style="color:${_nickColor}">${esc(nameOf(msg.senderId, msg.senderName))}</div>` : '';

                // Read receipt for outgoing messages
                const readTick = (isOut && msg.read)
                    ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:rgba(255,255,255,.9)"><polyline points="20 6 9 17 4 12"/></svg>` : '';

                row.innerHTML = `
      ${avHtml}
      <div class="msg-col">
        ${senderLabel}
        <div class="bubble">${content}</div>
        <div class="msg-time" style="${isOut ? '' : 'align-self:flex-start;'}">
          ${fmtTime(msg.timestamp)} ${readTick}
        </div>
      </div>`;

                area.appendChild(row);
            });

            if (wasAtBottom || msgs[msgs.length - 1]?.senderId === me.uid) {
                area.scrollTop = area.scrollHeight;
            }
        }

        function getFileIcon(ext) {
            const icons = { PDF: '📄', DOC: '📝', DOCX: '📝', XLS: '📊', XLSX: '📊', PPT: '📑', PPTX: '📑', TXT: '📃', ZIP: '🗜️', RAR: '🗜️', MP4: '🎥', MP3: '🎵', PNG: '🖼️', JPG: '🖼️', JPEG: '🖼️', GIF: '🖼️' };
            return icons[ext] || '📎';
        }

        function formatBytes(bytes) {
            if (!bytes) return '';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        /* ─── SEND MESSAGE ─── */
        async function sendMessage() {
            const input = $('chatInput');
            const text = input.value.trim();
            if (!text && !pendingFile) return;
            if (!activeChat) return;

            input.value = '';
            autoResizeInput();
            $('sendBtn').disabled = true;
            setTyping(false);

            const chatId = activeChat.type === 'direct'
                ? makeChatId(me.uid, activeChat.id)
                : activeChat.id;

            try {
                if (pendingFile) {
                    await sendFile(chatId);
                }
                if (text) {
                    const payload = {
                        chatId, senderId: me.uid, senderName: me.name,
                        text, type: 'text', timestamp: serverTimestamp(), read: false
                    };
                    if (activeChat.type === 'direct') {
                        payload.receiverId = activeChat.id;
                        // Send notification to receiver
                        await createNotification(activeChat.id, me.name, text, 'direct', chatId);
                    }
                    await addDoc(collection(db, 'messages'), payload);
                }
            } catch (e) {
                console.error('send:', e);
                toast('⚠️ Не удалось отправить сообщение');
                input.value = text;
            } finally {
                $('sendBtn').disabled = false;
                input.focus();
            }
        }

        /* ─── SEND FILE ─── */
        async function sendFile(chatId) {
            if (!pendingFile) return;
            const file = pendingFile;
            clearFilePreview();

            const isImage = file.type.startsWith('image/');

            try {
                toast('⏳ Загрузка файла...');
                const url = await uploadToCloudinary(file, `chat_files/${chatId}`);

                const payload = {
                    chatId, senderId: me.uid, senderName: me.name,
                    type: isImage ? 'image' : 'file',
                    [isImage ? 'imageUrl' : 'fileUrl']: url,
                    fileName: file.name, fileSize: file.size,
                    timestamp: serverTimestamp(), read: false
                };
                if (activeChat.type === 'direct') {
                    payload.receiverId = activeChat.id;
                    await createNotification(activeChat.id, me.name, `📎 ${file.name}`, 'direct', chatId);
                }
                await addDoc(collection(db, 'messages'), payload);
                toast('✅ Файл отправлен!');
            } catch (e) {
                console.error('sendFile:', e);
                toast('⚠️ Ошибка при загрузке файла');
            }
        }

                activeCat = cat;
                gridEl.innerHTML = '';
                EMOJIS[cat].forEach(em => {
                    const btn = document.createElement('button');
                    btn.className = 'e-btn';
                    btn.textContent = em;
                    btn.title = em;
                    btn.addEventListener('click', e => {
                        e.stopPropagation();
                        insertEmoji(em);
                    });
                    gridEl.appendChild(btn);
                });
                catsEl.querySelectorAll('.emoji-cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
            }

            cats.forEach((cat, i) => {
                const [emoji] = cat.split(' ');
                const btn = document.createElement('button');
                btn.className = 'emoji-cat-btn' + (i === 0 ? ' active' : '');
                btn.textContent = emoji;
                btn.title = cat;
                btn.dataset.cat = cat;
                btn.addEventListener('click', () => renderCat(cat));
                catsEl.appendChild(btn);
            });

            renderCat(cats[0]);

            $('emojiSearch').addEventListener('input', e => {
                const q = e.target.value.toLowerCase();
                if (!q) { renderCat(activeCat); return; }
                gridEl.innerHTML = '';
                Object.values(EMOJIS).flat().forEach(em => {
                    const btn = document.createElement('button');
                    btn.className = 'e-btn';
                    btn.textContent = em;
                    btn.addEventListener('click', ev => { ev.stopPropagation(); insertEmoji(em); });
                    gridEl.appendChild(btn);
                });
            });
        }

        function insertEmoji(em) {
            const input = $('chatInput');
            const start = input.selectionStart;
            const end = input.selectionEnd;
            const val = input.value;
            input.value = val.slice(0, start) + em + val.slice(end);
            input.selectionStart = input.selectionEnd = start + em.length;
            input.focus();
            autoResizeInput();
        }

        /* ─── GROUP CREATION ─── */
        async function createGroup() {
            const name = $('groupName').value.trim();
            const emoji = $('groupEmoji').value.trim() || '🏠';
            if (!name) { toast('Введите название группы'); return; }
            const checked = [...document.querySelectorAll('#groupMembersList input[type=checkbox]:checked')].map(cb => cb.value);
            const members = [me.uid, ...checked];

            const btn = $('groupCreate');
            btn.disabled = true; btn.textContent = 'Создаём...';
            try {
                const ref = await addDoc(collection(db, 'clubs'), {
                    name, emoji, description: '', members, createdBy: me.uid, createdAt: serverTimestamp()
                });
                $('groupModal').classList.remove('open');
                toast(`🎉 Группа «${name}» создана!`);
                await loadClubs();
                switchTab('clubs');
                const club = clubs.find(c => c.id === ref.id) || { id: ref.id, name, emoji, members };
                openClub(club);
            } catch (e) {
                console.error('createGroup:', e);
                toast('⚠️ Ошибка при создании группы');
            } finally {
                btn.disabled = false; btn.textContent = 'Создать';
            }
        }

        /* ─── BIND UI ─── */
        function bindUi() {
            $('tabDirect').addEventListener('click', () => switchTab('direct'));
            $('tabClubs').addEventListener('click', () => switchTab('clubs'));

            $('listSearch').addEventListener('input', e => {
                searchQ = e.target.value.toLowerCase().trim();
                renderList();
            });

            $('sendBtn').addEventListener('click', sendMessage);

            const input = $('chatInput');
            input.addEventListener('keydown', e => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
            });
            input.addEventListener('input', () => {
                autoResizeInput();
                // Typing indicator
                setTyping(true);
                clearTimeout(typingTimer);
                typingTimer = setTimeout(() => setTyping(false), 2500);
            });

            $('joinBtn').addEventListener('click', joinClub);

            // Emoji picker
            const emojiBtn = $('emojiBtn');
            const emojiPicker = $('emojiPicker');
            emojiBtn.addEventListener('click', e => {
                e.stopPropagation();
                emojiPicker.classList.toggle('open');
            });
            document.addEventListener('click', e => {
                if (!emojiPicker.contains(e.target) && e.target !== emojiBtn) {
                    emojiPicker.classList.remove('open');
                }
            });

            // Photo attachment (dedicated photo button — works in all chats incl. clubs)
            $('photoBtn').addEventListener('click', () => $('photoInput').click());
            $('photoInput').addEventListener('change', e => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 20 * 1024 * 1024) { toast('⚠️ Файл слишком большой (макс 20 МБ)'); return; }
                pendingFile = file;
                // Show image preview thumbnail in the preview bar
                const reader = new FileReader();
                reader.onload = ev => {
                    $('fpName').innerHTML = `<img src="${ev.target.result}" style="height:36px;border-radius:6px;object-fit:cover;vertical-align:middle;margin-right:6px;">📷 ${file.name} (${formatBytes(file.size)})`;
                };
                reader.readAsDataURL(file);
                $('filePreview').style.display = 'flex';
                $('chatInput').focus();
                e.target.value = '';
            });

            // File attachment (non-image files)
            $('attachBtn').addEventListener('click', () => $('fileInput').click());
            $('fileInput').addEventListener('change', e => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 20 * 1024 * 1024) { toast('⚠️ Файл слишком большой (макс 20 МБ)'); return; }
                pendingFile = file;
                $('fpName').textContent = `${file.name} (${formatBytes(file.size)})`;
                $('filePreview').style.display = 'flex';
                $('chatInput').focus();
                e.target.value = '';
            });
            $('fpClear').addEventListener('click', clearFilePreview);

            // Video call (Google Meet)
            $('videoBtn').addEventListener('click', () => {
                if (!activeChat || activeChat.type !== 'direct') return;
                const meetCode = Math.random().toString(36).slice(2, 12);
                const meetUrl = `https://meet.google.com/${meetCode}`;
                // Send the meeting link as a message
                const input = $('chatInput');
                const chatId = makeChatId(me.uid, activeChat.id);
                addDoc(collection(db, 'messages'), {
                    chatId, senderId: me.uid, senderName: me.name,
                    text: `📹 Видеозвонок: ${meetUrl}`,
                    type: 'text', timestamp: serverTimestamp(), read: false,
                    receiverId: activeChat.id
                }).then(() => {
                    createNotification(activeChat.id, me.name, `📹 Входящий видеозвонок от ${me.name}`, 'direct', chatId);
                    window.open(meetUrl, '_blank');
                    toast('📹 Google Meet открыт и ссылка отправлена!');
                }).catch(() => {
                    window.open(meetUrl, '_blank');
                });
            });

            // New group
            $('newGroupBtn').addEventListener('click', () => {
                // Populate member list
                const list = $('groupMembersList');
                list.innerHTML = '';
                contacts.forEach(c => {
                    const item = document.createElement('div');
                    item.className = 'modal-member-item';
                    item.innerHTML = `
        <input type="checkbox" value="${esc(c.uid)}" id="gm_${esc(c.uid)}">
        <label for="gm_${esc(c.uid)}" style="cursor:pointer;font-size:13px;flex:1;">${esc(c.name)}</label>`;
                    list.appendChild(item);
                });
                $('groupName').value = '';
                $('groupEmoji').value = '';
                $('groupModal').classList.add('open');
            });
            $('groupCancel').addEventListener('click', () => $('groupModal').classList.remove('open'));
            $('groupCreate').addEventListener('click', createGroup);

            renderList();
        }

        // Initial render
        renderList();

        /* ─── MOBILE WHATSAPP NAVIGATION ─── */
        function isMobile() { return window.innerWidth <= 768; }

        function mobOpenChat() {
            if (!isMobile()) return;
            // Пушим состояние для кнопки "Назад"
            history.pushState({ chatOpen: true }, '');
            $('convos').closest('.list-col').classList.add('mob-hidden');
            $('chatWin').classList.add('mob-open');
            setTimeout(() => {
                const inp = $('chatInput');
                if (inp && !inp.disabled) inp.focus();
            }, 320);
        }

        window._mobCloseChat = function () {
            if (!isMobile()) return;
            $('chatWin').classList.remove('mob-open');
            $('convos').closest('.list-col').classList.remove('mob-hidden');
        };

        // NOTE: mobOpenChat is now called directly inside openDirect() and openClub()
        // so we don't need a separate convos click handler for mobile

        // Свайп вправо от левого края — вернуться к списку
        let _touchX = 0;
        $('chatWin').addEventListener('touchstart', e => {
            _touchX = e.touches[0].clientX;
        }, { passive: true });
        $('chatWin').addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - _touchX;
            if (dx > 70 && _touchX < 50) window._mobCloseChat();
        }, { passive: true });

        // Кнопка Back браузера / Android
        window.addEventListener('popstate', () => {
            if (isMobile() && $('chatWin').classList.contains('mob-open')) {
                window._mobCloseChat();
            }
        });
    </script>
