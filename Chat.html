<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TutorApp — Чат</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --teal: #00A896;
            --teal-dark: #007F72;
            --teal-mid: #5BBDB5;
            --teal-light: #E0F5F3;
            --teal-pale: #F0FAF9;
            --bg: #F5F7FA;
            --white: #FFFFFF;
            --text: #1A2332;
            --text-mid: #4A5568;
            --muted: #9AA5B4;
            --border: #E8EDF3;
            --green: #38D68A;
            --red: #E05A7A;
            --shadow-xs: 0 1px 4px rgba(0, 0, 0, .06);
            --shadow-sm: 0 2px 12px rgba(0, 0, 0, .08);
            --r: 16px;
            --r-sm: 10px;
            --header-h: 60px;
            --subnav-h: 46px;
            --sidebar-w: 168px;
        }

        html,
        body {
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        /* LOADING */
        #loadingOverlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--white);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--teal-light);
            border-top-color: var(--teal);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        #loadingOverlay p {
            color: var(--muted);
            font-size: 14px;
        }

        /* HEADER */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-h);
            z-index: 700;
            background: var(--white);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 24px;
            box-shadow: var(--shadow-xs);
        }

        .h-ham {
            display: flex;
            flex-direction: column;
            gap: 4.5px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .h-ham span {
            display: block;
            width: 20px;
            height: 1.8px;
            background: var(--text-mid);
            border-radius: 2px;
        }

        .h-logo {
            font-weight: 800;
            font-size: 19px;
            color: var(--teal);
            letter-spacing: -.02em;
            flex-shrink: 0;
            text-decoration: none;
        }

        .h-logo span {
            color: var(--text);
        }

        .h-search {
            flex: 1;
            max-width: 380px;
            position: relative;
        }

        .h-search input {
            width: 100%;
            padding: 8px 40px 8px 36px;
            border-radius: 50px;
            border: 1.5px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color .2s, background .2s;
        }

        .h-search input:focus {
            border-color: var(--teal);
            background: var(--white);
        }

        .h-search input::placeholder {
            color: var(--muted);
        }

        .h-search .si-left {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
        }

        .h-search .si-right {
            position: absolute;
            right: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--teal);
            pointer-events: none;
        }

        .h-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .h-lang {
            background: none;
            color: var(--text-mid);
            border: 1.5px solid var(--border);
            border-radius: 50px;
            padding: 6px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: border-color .2s;
        }

        .h-lang:hover {
            border-color: var(--teal);
            color: var(--teal-dark);
        }

        .h-notif {
            position: relative;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg);
            border: 1.5px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-mid);
            transition: border-color .2s, background .2s;
        }

        .h-notif:hover {
            background: var(--teal-light);
            border-color: var(--teal);
        }

        .notif-badge {
            position: absolute;
            top: -3px;
            right: -3px;
            width: 17px;
            height: 17px;
            border-radius: 50%;
            background: var(--teal);
            border: 2px solid var(--white);
            color: white;
            font-size: 9px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .h-coins {
            background: var(--teal-pale);
            border-radius: 50px;
            padding: 6px 14px;
            color: var(--teal-dark);
            font-weight: 700;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1.5px solid var(--teal-light);
        }

        .coins-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--green);
        }

        .h-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--teal-mid);
            cursor: pointer;
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--teal-mid), var(--teal));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 15px;
        }

        /* SUBNAV */
        .subnav {
            position: fixed;
            top: var(--header-h);
            left: 0;
            right: 0;
            z-index: 600;
            height: var(--subnav-h);
            background: var(--white);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 0 24px;
        }

        .subnav a {
            text-decoration: none;
            color: var(--text-mid);
            font-size: 13.5px;
            font-weight: 500;
            padding: 6px 16px;
            border-radius: 50px;
            transition: all .18s;
            white-space: nowrap;
        }

        .subnav a:hover {
            background: var(--teal-light);
            color: var(--teal-dark);
        }

        .subnav a.active {
            color: var(--teal-dark);
            font-weight: 600;
            border-bottom: 2px solid var(--teal);
            border-radius: 0;
            padding-bottom: 4px;
        }

        /* LAYOUT */
        .app-body {
            position: fixed;
            top: calc(var(--header-h) + var(--subnav-h));
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: var(--sidebar-w);
            height: 100%;
            background: var(--white);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 16px 12px;
            gap: 4px;
            flex-shrink: 0;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: var(--r-sm);
            cursor: pointer;
            text-decoration: none;
            color: var(--text-mid);
            font-size: 13.5px;
            font-weight: 500;
            transition: background .18s, color .18s;
        }

        .sidebar-item svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            stroke: currentColor;
            fill: none;
        }

        .sidebar-item:hover {
            background: var(--teal-pale);
            color: var(--teal-dark);
        }

        .sidebar-item.active {
            background: var(--teal-light);
            color: var(--teal-dark);
            font-weight: 600;
        }

        .sidebar-divider {
            height: 1px;
            background: var(--border);
            margin: 8px 4px;
        }

        .sidebar-spacer {
            flex: 1;
        }

        .main-area {
            flex: 1;
            min-width: 0;
            height: 100%;
            display: flex;
            padding: 16px;
            gap: 0;
        }

        .chat-shell {
            flex: 1;
            display: flex;
            border-radius: var(--r);
            border: 1px solid var(--border);
            overflow: hidden;
            background: var(--white);
            box-shadow: var(--shadow-sm);
        }

        /* LIST COLUMN */
        .list-col {
            width: 280px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            background: var(--white);
        }

        .list-top {
            padding: 14px 16px 10px;
            border-bottom: 1px solid var(--border);
        }

        .list-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .list-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
        }

        .new-group-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--teal);
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .18s;
            flex-shrink: 0;
            font-size: 18px;
            line-height: 1;
        }

        .new-group-btn:hover {
            background: var(--teal-dark);
        }

        .tab-row {
            display: flex;
            background: var(--bg);
            border-radius: 8px;
            padding: 3px;
            gap: 3px;
        }

        .tab-btn {
            flex: 1;
            padding: 5px 0;
            border: none;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 12.5px;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: var(--muted);
            transition: background .18s, color .18s;
        }

        .tab-btn.active {
            background: var(--white);
            color: var(--teal-dark);
            box-shadow: 0 1px 3px rgba(0, 0, 0, .08);
        }

        .list-search {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }

        .list-search input {
            width: 100%;
            padding: 7px 14px 7px 32px;
            border-radius: 50px;
            border: 1.5px solid var(--border);
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            font-size: 12.5px;
            color: var(--text);
            outline: none;
            transition: border-color .2s, background .2s;
        }

        .list-search input:focus {
            border-color: var(--teal);
            background: var(--white);
        }

        .list-search input::placeholder {
            color: var(--muted);
        }

        .list-search-wrap {
            position: relative;
        }

        .list-search-wrap svg {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
        }

        .convos {
            flex: 1;
            overflow-y: auto;
        }

        .convos::-webkit-scrollbar {
            width: 4px;
        }

        .convos::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .conv-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 14px;
            cursor: pointer;
            transition: background .15s;
            border-left: 3px solid transparent;
        }

        .conv-card:hover {
            background: var(--teal-pale);
        }

        .conv-card.active {
            background: var(--teal-light);
            border-left-color: var(--teal);
        }

        .conv-av {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            background: var(--teal-pale);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .conv-av img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .conv-av-init {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: #fff;
            background: linear-gradient(135deg, var(--teal-mid), var(--teal));
        }

        .conv-online {
            position: absolute;
            bottom: 1px;
            right: 1px;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: var(--green);
            border: 2px solid var(--white);
        }

        .conv-body {
            flex: 1;
            min-width: 0;
        }

        .conv-name {
            font-size: 13.5px;
            font-weight: 600;
            color: var(--text);
        }

        .conv-preview {
            font-size: 12px;
            color: var(--muted);
            margin-top: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            flex-shrink: 0;
        }

        .conv-time {
            font-size: 10.5px;
            color: var(--muted);
        }

        .conv-badge {
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            background: var(--teal);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }

        .club-icon {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: linear-gradient(135deg, #8ECFC9, #00A896);
        }

        .list-empty {
            padding: 32px 16px;
            text-align: center;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
        }

        /* CHAT WINDOW */
        .chat-win {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .chat-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            gap: 10px;
            padding: 32px;
        }

        .chat-empty svg {
            opacity: .35;
        }

        .chat-empty h3 {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-mid);
        }

        .chat-empty p {
            font-size: 13px;
            text-align: center;
            line-height: 1.5;
            max-width: 280px;
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 13px 18px;
            border-bottom: 1px solid var(--border);
            background: var(--white);
            flex-shrink: 0;
        }

        .chat-hdr-av {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            background: var(--teal-pale);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            color: var(--teal-dark);
        }

        .chat-hdr-av img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-hdr-info {
            flex: 1;
            min-width: 0;
        }

        .chat-hdr-name {
            font-size: 14.5px;
            font-weight: 700;
            color: var(--text);
        }

        .chat-hdr-status {
            font-size: 11.5px;
            color: var(--muted);
            margin-top: 1px;
        }

        .chat-hdr-status.online {
            color: var(--green);
        }

        .chat-hdr-actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .icon-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--bg);
            border: 1.5px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-mid);
            transition: background .18s, border-color .18s, color .18s;
        }

        .icon-btn:hover {
            background: var(--teal-light);
            border-color: var(--teal);
            color: var(--teal-dark);
        }

        .icon-btn svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
        }

        /* MESSAGES */
        .msgs-area {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            background: #FAFCFE;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .msgs-area::-webkit-scrollbar {
            width: 5px;
        }

        .msgs-area::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 5px;
        }

        .date-sep {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            color: var(--muted);
            align-self: center;
            margin: 8px 0;
        }

        .date-sep::before,
        .date-sep::after {
            content: '';
            flex: 1;
            max-width: 50px;
            height: 1px;
            background: var(--border);
        }

        /* Message animation */
        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(8px) scale(.97)
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1)
            }
        }

        @keyframes msgOut {
            from {
                opacity: 0;
                transform: translateY(8px) scale(.97)
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1)
            }
        }

        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            max-width: 72%;
            animation: msgIn .22s ease-out forwards;
        }

        .msg-row.out {
            align-self: flex-end;
            flex-direction: row-reverse;
            animation-name: msgOut;
        }

        .msg-row.in {
            align-self: flex-start;
        }

        .msg-av-mini {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
            background: var(--teal-pale);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--teal-dark);
        }

        .msg-av-mini img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .msg-col {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .msg-sender {
            font-size: 11px;
            font-weight: 700;
            color: var(--teal-dark);
            margin-bottom: 3px;
            padding-left: 2px;
            letter-spacing: -0.01em;
        }

        .bubble {
            padding: 9px 13px;
            font-size: 13.5px;
            line-height: 1.55;
            border-radius: 14px;
            word-break: break-word;
            max-width: 100%;
        }

        .msg-row.in .bubble {
            background: var(--white);
            color: var(--text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .msg-row.out .bubble {
            background: var(--teal);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .msg-time {
            font-size: 10px;
            color: var(--muted);
            padding: 0 4px;
            align-self: flex-end;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .msg-row.out .msg-time {
            color: rgba(255, 255, 255, .7);
        }

        .msg-img {
            max-width: 220px;
            border-radius: 10px;
            display: block;
            cursor: zoom-in;
            transition: opacity .2s;
        }

        .msg-img:hover {
            opacity: .9;
        }

        .msg-file {
            display: flex;
            align-items: center;
            gap: 9px;
            background: rgba(0, 168, 150, .12);
            border-radius: 10px;
            padding: 9px 13px;
            cursor: pointer;
            transition: background .15s;
        }

        .msg-file:hover {
            background: rgba(0, 168, 150, .22);
        }

        .msg-file-icon {
            font-size: 22px;
        }

        .msg-file-name {
            font-size: 12.5px;
            font-weight: 600;
            color: var(--text);
            word-break: break-all;
        }

        .msg-file-size {
            font-size: 11px;
            color: var(--muted);
        }

        .msg-row.out .msg-file {
            background: rgba(255, 255, 255, .18);
        }

        .msg-row.out .msg-file-name {
            color: #fff;
        }

        .msg-row.out .msg-file-size {
            color: rgba(255, 255, 255, .7);
        }

        /* Typing */
        .typing-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            align-self: flex-start;
        }

        .typing-bubble {
            padding: 10px 14px;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 14px;
            border-bottom-left-radius: 4px;
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--muted);
            animation: tdot 1.2s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: .2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: .4s;
        }

        @keyframes tdot {

            0%,
            80%,
            100% {
                transform: scale(1)
            }

            40% {
                transform: scale(1.4)
            }
        }

        /* INPUT BAR */
        .input-bar {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding: 10px 14px;
            border-top: 1px solid var(--border);
            background: var(--white);
            flex-shrink: 0;
        }

        .input-actions {
            display: flex;
            gap: 4px;
            align-items: flex-end;
        }

        .input-action-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 18px;
            transition: color .18s, background .18s;
            flex-shrink: 0;
        }

        .input-action-btn:hover {
            color: var(--teal);
            background: var(--teal-light);
        }

        .input-wrap {
            flex: 1;
            position: relative;
        }

        #chatInput {
            width: 100%;
            border: 1.5px solid var(--border);
            border-radius: 20px;
            padding: 9px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13.5px;
            color: var(--text);
            outline: none;
            background: var(--bg);
            transition: border-color .2s, background .2s;
            resize: none;
            min-height: 40px;
            max-height: 120px;
            line-height: 1.4;
            overflow-y: auto;
        }

        #chatInput:focus {
            border-color: var(--teal);
            background: var(--white);
        }

        #chatInput::placeholder {
            color: var(--muted);
        }

        #chatInput:disabled {
            background: var(--bg);
            cursor: not-allowed;
            opacity: .6;
        }

        .send-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--teal);
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background .18s, transform .12s;
        }

        .send-btn:hover:not(:disabled) {
            background: var(--teal-dark);
            transform: scale(1.06);
        }

        .send-btn:disabled {
            background: var(--muted);
            cursor: not-allowed;
            transform: none;
        }

        .send-btn svg {
            width: 17px;
            height: 17px;
            stroke: #fff;
            fill: none;
        }

        /* File upload preview */
        #filePreview {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: var(--teal-pale);
            border-top: 1px solid var(--teal-light);
            font-size: 12.5px;
            color: var(--teal-dark);
        }

        #filePreview .fp-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 600;
        }

        #filePreview .fp-clear {
            cursor: pointer;
            color: var(--red);
            font-size: 16px;
            line-height: 1;
            background: none;
            border: none;
        }

        /* PHOTO BUTTON */
        #photoBtn {
            color: var(--teal-dark);
        }

        #photoBtn:hover {
            color: var(--teal);
            background: var(--teal-light);
        }

        /* File preview with image thumbnail */
        #filePreview .fp-name img {
            border: 1.5px solid var(--teal-light);
        }

        /* EMOJI PICKER */
        .emoji-picker {
            position: absolute;
            bottom: 52px;
            left: 0;
            width: 320px;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--r);
            box-shadow: var(--shadow-sm);
            z-index: 800;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .emoji-picker.open {
            display: flex;
        }

        .emoji-search {
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
        }

        .emoji-search input {
            width: 100%;
            border: 1.5px solid var(--border);
            border-radius: 50px;
            padding: 6px 12px;
            font-size: 12.5px;
            outline: none;
            font-family: 'DM Sans', sans-serif;
        }

        .emoji-search input:focus {
            border-color: var(--teal);
        }

        .emoji-cats {
            display: flex;
            gap: 2px;
            padding: 6px 8px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
        }

        .emoji-cats::-webkit-scrollbar {
            display: none;
        }

        .emoji-cat-btn {
            padding: 4px 8px;
            border: none;
            background: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background .15s;
        }

        .emoji-cat-btn.active,
        .emoji-cat-btn:hover {
            background: var(--teal-light);
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 2px;
            padding: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .emoji-grid::-webkit-scrollbar {
            width: 4px;
        }

        .emoji-grid::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .e-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            padding: 4px;
            border-radius: 6px;
            transition: background .12s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .e-btn:hover {
            background: var(--teal-light);
        }

        /* JOIN BAR */
        .join-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 14px 16px;
            border-top: 1px solid var(--border);
            background: var(--white);
            flex-shrink: 0;
        }

        .join-bar-text {
            font-size: 13px;
            color: var(--muted);
        }

        .join-btn {
            padding: 7px 18px;
            border-radius: 20px;
            background: var(--teal);
            color: #fff;
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background .18s;
            white-space: nowrap;
        }

        .join-btn:hover {
            background: var(--teal-dark);
        }

        .join-btn:disabled {
            background: var(--muted);
            cursor: not-allowed;
        }

        /* GROUP MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 9000;
            background: rgba(0, 0, 0, .4);
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal-box {
            background: var(--white);
            border-radius: var(--r);
            padding: 24px;
            width: 360px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .2);
        }

        .modal-box h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text);
        }

        .modal-input {
            width: 100%;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 9px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13.5px;
            outline: none;
            margin-bottom: 10px;
        }

        .modal-input:focus {
            border-color: var(--teal);
        }

        .modal-members {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 14px;
        }

        .modal-member-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            cursor: pointer;
            transition: background .15s;
        }

        .modal-member-item:hover {
            background: var(--teal-pale);
        }

        .modal-member-item input[type=checkbox] {
            accent-color: var(--teal);
            width: 15px;
            height: 15px;
            cursor: pointer;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-cancel {
            padding: 8px 18px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-mid);
        }

        .modal-cancel:hover {
            border-color: var(--teal);
            color: var(--teal-dark);
        }

        .modal-create {
            padding: 8px 18px;
            border-radius: 20px;
            background: var(--teal);
            color: #fff;
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background .18s;
        }

        .modal-create:hover {
            background: var(--teal-dark);
        }

        .modal-create:disabled {
            background: var(--muted);
            cursor: not-allowed;
        }

        /* IMAGE LIGHTBOX */
        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 9500;
            background: rgba(0, 0, 0, .85);
            display: none;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }

        .lightbox.open {
            display: flex;
        }

        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .5);
        }

        /* TOAST */
        #toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(12px);
            background: var(--text);
            color: #fff;
            font-size: 13px;
            padding: 10px 20px;
            border-radius: 50px;
            opacity: 0;
            transition: opacity .25s, transform .25s;
            z-index: 9000;
            white-space: nowrap;
            pointer-events: none;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* NOTIFICATION BELL PULSE */
        @keyframes notifPulse {

            0%,
            100% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.15)
            }
        }

        .notif-pulse {
            animation: notifPulse .4s ease-in-out;
        }

        /* UNREAD MSGS COUNT BADGE */
        .list-top-badge {
            background: var(--red);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            border-radius: 9px;
            padding: 1px 6px;
            margin-left: 6px;
        }

        * {
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        /* ══════════════════════════════════════════
           MOBILE — Chat.html  (WhatsApp-style)
        ══════════════════════════════════════════ */

        /* Кнопка "назад" в хедере чата — скрыта на десктопе */
        .mob-back-btn {
            display: none;
        }

        /* ══════════════════════════════════════════
           MOBILE — Chat.html (WhatsApp-style)
        ══════════════════════════════════════════ */

        /* Кнопка назад — скрыта на десктопе */
        .mob-back-btn {
            display: none;
        }

        /* Нижняя навигация — скрыта на десктопе */
        .mob-nav {
            display: none;
        }

        @media (max-width: 768px) {

            /* --- хедер --- */
            header {
                padding: 0 12px;
                gap: 8px;
            }

            .h-search {
                display: none;
            }

            .h-lang {
                display: none;
            }

            .h-coins {
                display: none;
            }

            .h-ham {
                display: none;
            }

            .h-nav {
                display: none;
            }

            .h-notif {
                width: 32px;
                height: 32px;
            }

            .h-avatar {
                width: 32px;
                height: 32px;
                font-size: 13px;
            }

            /* --- subnav скрыт --- */
            .subnav {
                display: none !important;
            }

            /* --- нижняя навигация --- */
            .mob-nav {
                display: flex;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                z-index: 800;
                background: var(--white);
                border-top: 1.5px solid var(--border);
                height: 56px;
                align-items: stretch;
                box-shadow: 0 -4px 18px rgba(0, 0, 0, .08);
            }

            .mob-nav a {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 3px;
                text-decoration: none;
                color: var(--muted);
                font-size: 10px;
                font-weight: 600;
                transition: color .18s;
            }

            .mob-nav a svg {
                width: 20px;
                height: 20px;
                stroke: currentColor;
                fill: none;
                stroke-width: 2;
            }

            .mob-nav a.active {
                color: var(--teal);
            }

            .mob-nav a.active svg {
                stroke: var(--teal);
            }

            /* --- app-body: только header (subnav скрыт) --- */
            .app-body {
                top: var(--header-h);
                bottom: 56px;
                /* место под нижнее меню */
            }

            /* --- убираем левый sidebar --- */
            .sidebar {
                display: none;
            }

            /* --- main-area: без паддинга --- */
            .main-area {
                padding: 0;
                height: 100%;
            }

            /* --- chat-shell: позиционирующий контейнер --- */
            .chat-shell {
                position: relative;
                overflow: hidden;
                border-radius: 0;
                border: none;
                box-shadow: none;
                height: 100%;
            }

            /* ── СПИСОК: на всю ширину, уезжает влево при открытии чата ── */
            .list-col {
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                width: 100%;
                border-right: none;
                z-index: 10;
                background: var(--white);
                transition: transform 0.28s cubic-bezier(.4, 0, .2, 1);
            }

            .list-col.mob-hidden {
                transform: translateX(-100%);
                pointer-events: none;
            }

            /* ── ЧАТ: выезжает справа ── */
            .chat-win {
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 20;
                background: var(--white);
                transform: translateX(100%);
                transition: transform 0.28s cubic-bezier(.4, 0, .2, 1);
                display: flex;
                flex-direction: column;
            }

            .chat-win.mob-open {
                transform: translateX(0);
            }

            /* --- кнопка назад --- */
            .mob-back-btn {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 36px;
                height: 36px;
                border: none;
                background: none;
                cursor: pointer;
                color: var(--teal);
                border-radius: 50%;
                transition: background .18s;
                flex-shrink: 0;
            }

            .mob-back-btn:active {
                background: var(--teal-light);
            }

            .mob-back-btn svg {
                width: 22px;
                height: 22px;
                stroke: currentColor;
                fill: none;
                stroke-width: 2.5;
                stroke-linecap: round;
                stroke-linejoin: round;
            }

            /* --- chat-header --- */
            .chat-header {
                padding: 10px 12px;
                gap: 8px;
            }

            .chat-hdr-name {
                font-size: 14px;
            }

            .chat-hdr-av {
                width: 34px;
                height: 34px;
                font-size: 13px;
            }

            .chat-empty {
                display: none !important;
            }

            /* --- сообщения --- */
            .msgs-area {
                padding: 10px 10px;
            }

            .msg-row {
                max-width: 86%;
            }

            .bubble {
                font-size: 13px;
                padding: 8px 12px;
            }

            /* --- input bar --- */
            .input-bar {
                padding: 8px 10px;
                gap: 6px;
            }

            .input-action-btn {
                width: 32px;
                height: 32px;
                font-size: 16px;
            }

            .send-btn {
                width: 36px;
                height: 36px;
            }

            #chatInput {
                font-size: 13px;
                padding: 8px 14px;
            }

            /* --- список --- */
            .list-top {
                padding: 12px 14px 10px;
            }

            .list-title {
                font-size: 18px;
            }

            .conv-card {
                padding: 12px 14px;
            }

            .conv-av {
                width: 46px;
                height: 46px;
            }

            .conv-name {
                font-size: 14px;
            }

            .conv-preview {
                font-size: 12px;
            }
        }
    </style>
</head>
